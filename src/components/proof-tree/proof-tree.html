<ng-container *ngIf="mode === 'interactive' && interactiveSubmode === 'predict'; else sharedRendererTree">
  <div class="main" *ngIf="root as r">
    <div class="proof-node">
      <div class="children" *ngIf="r.children?.length" #childrenEl>
        <app-proof-tree
          *ngFor="let child of r.children"
          [root]="child"
          [mode]="mode"
          [interactiveSubmode]="interactiveSubmode"
          [selectedNode]="selectedNode"
          [predictionRuleRequest]="predictionRuleRequest"
          [predictionActive]="hasPendingPrediction || predictionActive"
          [quantifierInputRequest]="quantifierInputRequest"
          (nodeClicked)="handleNodeClicked($event)"
          (plusButtonClicked)="plusButtonClicked.emit($event)"
          (ruleSelected)="ruleSelected.emit($event)"
          (quantifierInputConfirm)="quantifierInputConfirm.emit($event)"
          (quantifierInputCancel)="quantifierInputCancel.emit()">
        </app-proof-tree>
      </div>

      <div class="quantifier-inline-input" *ngIf="hasQuantifierInput && quantifierInputRequest">
        <input
          type="text"
          class="quantifier-input-field"
          [value]="quantifierInputValue"
          [attr.size]="quantifierInputValue.length > 22 ? quantifierInputValue.length + 3 : 24"
          (input)="onQuantifierInput($event)"
          [placeholder]="quantifierInputRequest.label"
          (keyup.enter)="onQuantifierConfirm()"
          (keydown)="onQuantifierKeyDown($event)"
          autofocus
        />
        <button class="quantifier-confirm-btn" (click)="onQuantifierConfirm()" title="OK">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
      </div>

      <div class="prediction-inputs" *ngIf="hasPendingPrediction">
        <div class="prediction-inputs-wrapper-row">
          <div 
            *ngFor="let prediction of userPredictions; let i = index; trackBy: trackByIndex" 
            class="prediction-input-wrapper"
          >
            <div class="quantifier-inline-input">
              <input 
                type="text" 
                class="quantifier-input-field" 
                [value]="userPredictions[i]"
                [attr.size]="(userPredictions[i]?.length || 0) > 22 ? (userPredictions[i]?.length || 0) + 3 : 24"
                (input)="onPredictionInput($event, i)"
                [placeholder]="t.predictSequent + ' ' + (i + 1) + ' (e.g., A ⊢ B)'"
                (keyup.enter)="confirmPrediction()"
                (keydown)="onKeyDown($event)"
              />
              <button class="quantifier-confirm-btn" (click)="confirmPrediction()" title="OK" *ngIf="i === userPredictions.length - 1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="conclusion" #conclusionEl [style.--line-width.px]="lineWidthPx" [style.--line-offset.px]="lineOffsetPx" [ngClass]="{ selected: isSelected, 'clickable-for-fill': hasPendingPrediction || predictionActive }" (click)="handleNodeClicked(r)">
        <button 
          *ngIf="mode === 'interactive' && !r.children?.length && r.rule !== 'Ax' && r.rule !== 'id'"
          class="rule-plus-btn"
          (click)="onPlusButtonClick($event)"
          [title]="t.addRule"
          [attr.aria-label]="t.addRule"
        >
          <span class="plus-icon">+</span>
        </button>
        <span class="rule" *ngIf="r.children?.length || r.rule === 'Ax' || r.rule === 'id'">
          {{ displayRuleLabel(r.rule) }}
        </span>
        <div class="sequent-content" [appKatex]="r.sequentLatex || sequentToLatex(r.sequent)"></div>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #sharedRendererTree>
  <div class="renderer-with-quantifier">
    <div class="quantifier-inline-input" *ngIf="quantifierInputRequest">
      <input
        type="text"
        class="quantifier-input-field"
        [value]="quantifierInputValue"
        [attr.size]="quantifierInputValue.length > 22 ? quantifierInputValue.length + 3 : 24"
        (input)="onQuantifierInput($event)"
        [placeholder]="quantifierInputRequest.label"
        (keyup.enter)="onQuantifierConfirm()"
        (keydown)="onQuantifierKeyDown($event)"
        autofocus
      />
      <button class="quantifier-confirm-btn" (click)="onQuantifierConfirm()" title="OK">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
    </div>
    <app-tree-renderer
      [treeType]="'sequent'"
      [root]="root"
      [mode]="mode"
      [selectedNode]="selectedNode"
      [currentLanguage]="currentLanguage"
      [sequentLatexFn]="rendererSequentLatex"
      [ruleLabelFn]="rendererRuleLabel"
      [showPlusButtonFn]="canShowPlusButton"
      [showRuleFn]="canShowRule"
      (nodeClicked)="onRendererNodeClicked($event)"
      (plusButtonClicked)="onRendererPlusButtonClicked($event)">
    </app-tree-renderer>
  </div>
</ng-template>
